<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven | Clinic AI Chat</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg-1:#f6f7ff;
            --bg-2:#eef6ff;
            --card:#ffffff;
            --accent:#6c5ce7;
            --accent-2:#00b894;
            --muted:#7b7f87;
        }
        *{box-sizing:border-box}
        body{
            font-family:'Tajawal',system-ui,Segoe UI,Roboto,Arial,sans-serif;
            margin:0;
            min-height:100vh;
            background:linear-gradient(180deg,var(--bg-1),var(--bg-2));
            display:flex;
            align-items:center;
            justify-content:center;
            padding:28px;
            color:#1f2937;
        }

        .app-card{
            width:100%;
            max-width:920px;
            height:86vh;
            background:var(--card);
            border-radius:14px;
            box-shadow:0 10px 30px rgba(15,23,42,0.08);
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        header{
            padding:18px 22px;
            display:flex;
            align-items:center;
            gap:16px;
            border-bottom:1px solid #f0f2f5;
            background:linear-gradient(90deg, rgba(108,92,231,0.06), rgba(0,184,148,0.03));
        }

        .logo{
            width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg,var(--accent),#4b6ef6);color:white;font-weight:700;font-size:20px;
            box-shadow:0 6px 18px rgba(108,92,231,0.12);
        }
        .title{font-weight:700;font-size:18px}
        .subtitle{font-size:12px;color:var(--muted)}

        .layout{
            display:flex;flex:1;min-height:0; /* important for flex scroll */
        }

        /* Left side placeholder / illustration */
        .aside{
            width:320px;padding:20px;border-left:1px solid #fafafa;background:linear-gradient(180deg,rgba(99,102,241,0.03),transparent);
            display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;text-align:center
        }
        .aside h3{margin:6px 0 0 0}
        .aside p{margin:0;color:var(--muted);font-size:13px}

        /* Chat area */
        .chat-pane{flex:1;display:flex;flex-direction:column;min-width:0}
        #chat-container{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:12px}

        /* message bubbles */
        .message{max-width:78%;padding:12px 16px;border-radius:14px;line-height:1.45;white-space:pre-wrap;animation:pop .14s ease}
        @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.995)}to{opacity:1;transform:none}}

        .assistant{align-self:flex-start;background:#f3f5ff;color:#0b1020;border:1px solid #eef2ff}
        .user{align-self:flex-end;background:linear-gradient(90deg,var(--accent),#4b6ef6);color:white}
        .meta{display:block;font-size:12px;color:var(--muted);margin-top:8px}

        .success{border-left:4px solid #16a34a;background:#ecfdf5}
        .error{border-left:4px solid #ef4444;background:#fff1f2}

        .info{margin-top:8px;font-size:13px;color:#374151;background:rgba(15,23,42,0.03);padding:8px;border-radius:8px}

        /* input area */
        #input-area{display:flex;gap:12px;padding:14px;border-top:1px solid #f0f2f5;background:linear-gradient(180deg,#ffffff, #fbfdff)}
        #user-input{flex:1;padding:12px;border-radius:10px;border:1px solid #e6e9ef;outline:none;font-size:15px}
        #send-btn{background:linear-gradient(90deg,var(--accent),#4b6ef6);border:none;color:white;padding:10px 16px;border-radius:10px;cursor:pointer}
        #send-btn:disabled{opacity:.5;cursor:not-allowed}

        /* scroll bar small */
        #chat-container::-webkit-scrollbar{width:8px}
        #chat-container::-webkit-scrollbar-thumb{background:#e1e6f3;border-radius:6px}

        footer{padding:10px 14px;text-align:center;font-size:12px;color:var(--muted);border-top:1px solid #f7f7fb}

        @media (max-width:880px){.aside{display:none}.app-card{max-width:100%;height:92vh}}
    </style>
</head>
<body dir="rtl">
<div class="app-card" role="application">
    <header>
        <div class="logo">H</div>
        <div>
            <div class="title">Haven — مساعد حجز العيادة</div>
            <div class="subtitle">اسأل وسأساعدك بحجز المواعيد بسرعة</div>
        </div>
    </header>

    <div class="layout">
        <div class="chat-pane">
            <div id="chat-container" aria-live="polite"></div>

            <div id="input-area">
                <input type="text" id="user-input" placeholder="اكتب رسالتك هنا... (مثال: أرغب بموعد يوم الثلاثاء 10 صباحًا)" autofocus>
                <button id="send-btn">إرسال</button>
            </div>
        </div>

        <aside class="aside" aria-hidden="false">
            <!-- lightweight illustration -->
            <svg width="140" height="120" viewBox="0 0 140 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="6" y="18" width="128" height="84" rx="12" fill="#f6f7ff"/>
                <circle cx="36" cy="46" r="10" fill="#6c5ce7"/>
                <rect x="56" y="36" width="58" height="8" rx="4" fill="#dfe7ff"/>
                <rect x="56" y="52" width="44" height="8" rx="4" fill="#dfe7ff"/>
                <rect x="56" y="68" width="30" height="8" rx="4" fill="#dfe7ff"/>
            </svg>
            <h3>حجز سهل وواضح</h3>
            <p>أدخل طلبك وسيقوم النظام بمساعدتك في إتمام الحجز والتحقق من المعلومات الناقصة.</p>
        </aside>
    </div>

    <footer>تعمل الخدمة محليًا على <code>http://127.0.0.1:8000/api/v1/chat</code>. لا تتردد في تشغيل الخادم.</footer>
</div>

<script>
// Preserve existing logic but adapted to new markup and small UX tweaks
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function appendMessage(role, text, extraHTML = "", status = "") {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    if (role === 'assistant') {
        if (status === 'confirmed') div.classList.add('success');
        if (status === 'failed') div.classList.add('error');
    }

    div.innerHTML = text + extraHTML;
    chatContainer.appendChild(div);
    // smooth scroll
    chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    return div;
}

function renderEntities(entities) {
    if (!entities || Object.keys(entities).length === 0) return '';
    return `\n    <div class="info">\n        📋 <b>التفاصيل:</b><br>\n        👤 الاسم: ${entities.name || '-'}<br>\n        📅 التاريخ: ${entities.date || '-'}<br>\n        ⏰ الوقت: ${entities.time || '-'}<br>\n        🛠️ الخدمة: ${entities.service || '-'}\n    </div>`;
}

function renderMissing(missing) {
    if (!missing || missing.length === 0) return '';
    return `\n    <div class="info" style="color:#b00020;">\n        ⚠️ معلومات ناقصة: ${missing.join(', ')}\n    </div>`;
}

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    appendMessage('user', text);
    userInput.value = '';

    const aiBubble = appendMessage('assistant', '⏳ جاري التفكير...');
    sendBtn.disabled = true;

    try {
        if (!localStorage.getItem('chat_session_id')) localStorage.setItem('chat_session_id', crypto.randomUUID());
        const sessionId = localStorage.getItem('chat_session_id');
        const response = await fetch("https://clinic-scheduling-agent.onrender.com/api/v1/chat", {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId, messages: [{ role: 'user', content: text }] })
        });

        const data = await response.json();
        const mainText = data.response || 'لا يوجد رد';
        const entitiesHTML = renderEntities(data.entities);
        const missingHTML = renderMissing(data.missing_fields);

        aiBubble.innerHTML = mainText + entitiesHTML + missingHTML;
        if (data.status === 'confirmed') aiBubble.classList.add('success');
        else if (data.status === 'failed') aiBubble.classList.add('error');

    } catch (err) {
        aiBubble.innerText = '❌ خطأ: تعذر الاتصال بالخادم.';
        aiBubble.classList.add('error');
    } finally {
        sendBtn.disabled = false;
    }
}

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

window.addEventListener('load', () => {
    appendMessage('assistant', '👋 مرحبا! أنا Haven، كيف يمكنني مساعدتك في حجز موعد؟');
});
</script>
</body>
</html>
