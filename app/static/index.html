<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven | Clinic AI Chat</title>

    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background: #f4f4f9;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 75%;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user {
            align-self: flex-end;
            background: #007bff;
            color: white;
        }

        .assistant {
            align-self: flex-start;
            background: #e9e9eb;
            color: #333;
        }

        .success {
            background: #d4edda;
        }

        .error {
            background: #f8d7da;
        }

        .info {
            margin-top: 10px;
            font-size: 0.9em;
            border-top: 1px solid #ccc;
            padding-top: 8px;
        }

        #input-area {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:disabled {
            background: #ccc;
        }
    </style>
</head>

<body dir="rtl">

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." autofocus>
    <button id="send-btn">إرسال</button>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function appendMessage(role, text, extraHTML = "", status = "") {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    if (role === "assistant") {
        if (status === "confirmed") div.classList.add("success");
        if (status === "failed") div.classList.add("error");
    }

    div.innerHTML = text + extraHTML;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
}

function renderEntities(entities) {
    if (!entities || Object.keys(entities).length === 0) return "";

    return `
    <div class="info">
        📋 <b>التفاصيل:</b><br>
        👤 الاسم: ${entities.name || "-"}<br>
        📅 التاريخ: ${entities.date || "-"}<br>
        ⏰ الوقت: ${entities.time || "-"}<br>
        🛠️ الخدمة: ${entities.service || "-"}
    </div>`;
}

function renderMissing(missing) {
    if (!missing || missing.length === 0) return "";

    return `
    <div class="info" style="color:#b00020;">
        ⚠️ معلومات ناقصة: ${missing.join(", ")}
    </div>`;
}

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage('user', text);
    userInput.value = '';

    const aiBubble = appendMessage('assistant', '⏳ جاري التفكير...');
    sendBtn.disabled = true;

    try {
        if (!localStorage.getItem('chat_session_id')) {
            localStorage.setItem('chat_session_id', crypto.randomUUID());
        }

        const sessionId = localStorage.getItem('chat_session_id');

        const response = await fetch('http://127.0.0.1:8000/api/v1/chat', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                session_id: sessionId,
                messages: [{ role: 'user', content: text }]
            })
        });

        const data = await response.json();

        const mainText = data.response || "لا يوجد رد";
        const entitiesHTML = renderEntities(data.entities);
        const missingHTML = renderMissing(data.missing_fields);

        aiBubble.innerHTML = mainText + entitiesHTML + missingHTML;

        if (data.status === "confirmed") {
            aiBubble.classList.add("success");
        } else if (data.status === "failed") {
            aiBubble.classList.add("error");
        }

    } catch (err) {
        aiBubble.innerText = "❌ خطأ: تعذر الاتصال بالخادم.";
        aiBubble.classList.add("error");
    } finally {
        sendBtn.disabled = false;
    }
}

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});

window.addEventListener('load', () => {
    appendMessage('assistant', '👋 مرحبا! أنا Haven، كيف يمكنني مساعدتك في حجز موعد؟');
});
</script>

</body>
</html>
